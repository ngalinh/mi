<defs><marker id="ah" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#475569"/></marker></defs>
<rect width="1280" height="1500" fill="#f8fafc"/>
<text x="40" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a" text-anchor="start">Doraemi Bot — Luồng báo hàng về VN (A → Z)</text>
<text x="40" y="80" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#475569" text-anchor="start">Tự động báo "hàng đã về kho" cho khách qua Zalo (Salework)</text>
<rect x="40" y="110" width="300" height="150" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
<text x="60" y="144" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#92400e" text-anchor="start">WEBSITE BASSO</text>
<text x="60" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#7c2d12" text-anchor="start">Partner API (nguồn hàng về)</text>
<text x="60" y="196" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#7c2d12" text-anchor="start">• getArrivedVnList — danh sách</text>
<text x="60" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#7c2d12" text-anchor="start">• getArrivedVnItems — chi tiết</text>
<text x="60" y="244" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#7c2d12" text-anchor="start">• updateArrivedVnRow — cập nhật</text>
<rect x="400" y="110" width="470" height="150" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
<text x="420" y="144" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#3730a3" text-anchor="start">server/  (bộ não — ai.basso.vn)</text>
<text x="420" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#312e81" text-anchor="start">• Dashboard + REST API</text>
<text x="420" y="196" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#312e81" text-anchor="start">• Quyết định GỬI CHO AI + build tin</text>
<text x="420" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#312e81" text-anchor="start">• Bot tự động (auto-notify)</text>
<text x="420" y="244" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#312e81" text-anchor="start">• Chống trùng + ghi lịch sử (SQLite)</text>
<rect x="930" y="110" width="310" height="150" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
<text x="950" y="144" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#065f46" text-anchor="start">local-runner/ (cánh tay)</text>
<text x="950" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#064e3b" text-anchor="start">Máy có Chrome thật</text>
<text x="950" y="196" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#064e3b" text-anchor="start">• Playwright + session Zalo</text>
<text x="950" y="220" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#064e3b" text-anchor="start">• THỰC THI việc gửi</text>
<text x="950" y="244" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#064e3b" text-anchor="start">• zalo.salework.net</text>
