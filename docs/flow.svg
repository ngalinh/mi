<text x="664" y="1166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#16a34a" text-anchor="start">✓ success / manual</text>
<text x="664" y="1190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">không gửi lại lần 2</text>
<rect x="952" y="1138" width="288" height="70" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
<text x="968" y="1166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#16a34a" text-anchor="start">✓ withLock</text>
<text x="968" y="1190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">tay &amp; bot không chạy chồng</text>
<rect x="40" y="1224" width="288" height="70" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
<text x="56" y="1252" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#16a34a" text-anchor="start">✓ strictMatch</text>
<text x="56" y="1276" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">bot không gửi nhầm người</text>
<rect x="344" y="1224" width="288" height="70" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
<text x="360" y="1252" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#16a34a" text-anchor="start">✓ skip khi runner offline</text>
<text x="360" y="1276" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">không "bỏ cuộc" oan</text>
<rect x="648" y="1224" width="288" height="70" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
<text x="664" y="1252" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#16a34a" text-anchor="start">✓ quét hết trang</text>
<text x="664" y="1276" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">không bỏ sót đơn &gt;100</text>
<text x="40" y="1476" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">* Bot mặc định KHÔNG cập nhật web Basso (AUTO_NOTIFY_UPDATE_WEB=false) — chỉ đánh dấu trong mi (badge 🤖). Chi tiết: docs/FLOW.md</text>
