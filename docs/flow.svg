<text x="56" y="1166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#16a34a" text-anchor="start">✓ TEST_MODE</text>
<text x="56" y="1190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">chỉ gửi số whitelist</text>
