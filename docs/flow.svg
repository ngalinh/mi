<line x1="560" y1="835" x2="330" y2="900" stroke="#475569" stroke-width="2.5" marker-end="url(#ah)"/>
<text x="40" y="1114" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="start">Các lớp chống sai &amp; chống trùng</text>
