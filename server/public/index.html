<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doraemi · Báo hàng về</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar: icon rail -->
    <aside class="sidebar">
      <div class="brand" title="Doraemi">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
      </div>
      <nav class="rail-nav">
        <a class="nav active" href="/index.html" title="Hàng về VN"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span></a>
        <a class="nav" href="/reports.html" title="Lịch sử báo"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg></span></a>
      </nav>
      <div class="side-foot">
        <span class="rail-sep"></span>
        <div class="avatar" title="Doraemi Bot">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div>
          <h1>Hàng về <span class="accent">VN</span></h1>
          <div class="sub">Danh sách đơn hàng & gửi thông báo qua Zalo</div>
        </div>
        <span class="spacer"></span>
        <span id="testBadge" class="badge-status badge-test" style="display:none"></span>
        <span id="mockBadge" class="badge-status badge-mock" style="display:none">MOCK DATA</span>
        <button id="autoBadge" class="badge-status badge-clickable badge-offline" title="Tự động báo hàng khi có đơn về">Tự động: ...</button>
        <span id="localBadge" class="badge-status badge-offline">Local-runner: ...</span>
        <button id="bassoBtn" class="btn secondary" title="Kiểm tra kết nối tới Basso API">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/></svg>
          Test Basso
        </button>
        <button id="syncBtn" class="btn">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          Đồng bộ ngay
        </button>
      </header>

      <div class="container">
        <div class="card">
          <div class="filters">
            <div class="field"><label>Từ ngày</label><input type="date" id="fFrom" /></div>
            <div class="field"><label>Đến ngày</label><input type="date" id="fTo" /></div>
            <div class="field"><label>Trạng thái</label>
              <select id="fStatus">
                <option value="all">Tất cả</option>
                <option value="not_sent">Chưa báo</option>
                <option value="notified_arrival">Đã báo hàng</option>
                <option value="notified_ship">Đã báo ship</option>
                <option value="send_failed">Gửi lỗi</option>
              </select>
            </div>
            <div class="field"><label>Nhân viên</label>
              <select id="fStaff"><option value="">Tất cả</option></select>
            </div>
            <div class="field full"><label>Tìm kiếm</label>
              <div class="input-icon">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="fQ" placeholder="Tên / SĐT khách" />
              </div>
            </div>
          </div>

          <!-- Tab nhân viên (pill) -->
          <div class="tabs" id="staffTabs"></div>

          <!-- Thanh thao tác bot (gửi hàng loạt) -->
          <div class="bot-bar">
            <span id="countInfo" class="muted"></span>
            <span class="grow"></span>
            <button id="bulkBtn" class="btn small">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
              Báo hàng loạt (chưa báo)
            </button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:34px"></th>
                  <th class="center" style="width:50px">STT</th>
                  <th>Ngày nhập kho</th>
                  <th>Khách hàng</th>
                  <th>SĐT</th>
                  <th class="center">ND báo hàng</th>
                  <th class="center">ND báo ship</th>
                  <th>Trạng thái</th>
                  <th>Ghi chú</th>
                  <th>Nhân viên</th>
                </tr>
              </thead>
              <tbody id="rows"><tr><td colspan="10" class="empty">Đang tải...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal xem/sửa nội dung + gửi Zalo -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">Nội dung báo hàng</h3>
      <p class="muted" id="modalSub"></p>
      <textarea id="modalMsg"></textarea>
      <div class="row">
        <button class="btn secondary" id="modalCancel">Đóng</button>
        <button class="btn" id="modalSend">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14.54 21.69a.5.5 0 0 0 .94-.03l6.5-19a.5.5 0 0 0-.64-.63l-19 6.5a.5.5 0 0 0-.02.93l7.93 3.18a2 2 0 0 1 1.1 1.11z"/><path d="m21.85 2.15-10.94 10.94"/></svg>
          Gửi báo hàng qua Zalo
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
