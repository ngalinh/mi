<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi · Báo hàng về</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar: icon rail -->
    <aside class="sidebar">
      <div class="brand" title="Mi">
        <img class="brand-logo" src="mi-logo.png" alt="Mi" />
      </div>
      <nav class="rail-nav">
        <a class="nav active" href="index.html" title="Hàng về VN"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span></a>
        <a class="nav" href="reports.html" title="Lịch sử báo"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg></span></a>
      </nav>
      <div class="side-foot">
        <a class="nav" href="settings.html" title="Cài đặt"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span></a>
        <span class="rail-sep"></span>
        <div class="avatar" id="userAvatar" title="Đang tải...">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div>
          <h1>Danh sách <span class="accent">Hàng về VN</span></h1>
        </div>
        <span class="spacer"></span>
        <span id="testBadge" class="badge-status badge-test" style="display:none"></span>
        <span id="mockBadge" class="badge-status badge-mock" style="display:none">MOCK DATA</span>
        <span id="syncInfo" class="sync-info"></span>
        <button id="syncBtn" class="btn accent">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          Đồng bộ ngay
        </button>
      </header>

      <div class="container">
        <div class="card">
          <!-- Tab nhân viên (pill) -->
          <div class="tabs" id="staffTabs"></div>

          <!-- Thanh công cụ gộp: tìm kiếm · nhóm · lọc · thao tác -->
          <div class="toolbar-bar">
            <select id="fScope" class="tb-select" title="Phạm vi thời gian">
              <option value="0" selected>Tất cả thời gian</option>
              <option value="7">7 ngày gần đây</option>
              <option value="30">30 ngày gần đây</option>
              <option value="90">90 ngày gần đây</option>
            </select>
            <select id="fStatus" class="tb-select" title="Lọc theo trạng thái">
              <option value="">Tất cả trạng thái</option>
              <option value="todo" selected>Chưa báo</option>
              <option value="arrival">Đã báo hàng</option>
              <option value="ship">Đã báo ship</option>
              <option value="failed">Lỗi - Báo lại</option>
            </select>
            <div class="input-icon tb-search">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" id="fQ" placeholder="Tìm tên / SĐT khách..." />
            </div>
            <select id="fGroupBy" class="tb-select">
              <option value="">- Group -</option>
              <option value="date">Group theo ngày</option>
              <option value="customer">Group theo KH</option>
              <option value="channel">Group theo kênh</option>
            </select>
            <div class="tb-filter-wrap">
              <button class="btn secondary small tb-filter" id="filterBtn" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                Bộ lọc <span class="cnt zero">0</span>
              </button>
              <div class="filter-pop" id="filterPop" hidden>
                <div class="fp-head">Bộ lọc nâng cao</div>
                <div class="fp-group">
                  <label>Khoảng ngày nhập kho (tuỳ chọn)</label>
                  <div class="fp-row2">
                    <input type="date" id="fFrom" />
                    <span class="muted">—</span>
                    <input type="date" id="fTo" />
                  </div>
                </div>
                <div class="fp-group">
                  <label>Loại trừ (Delay)</label>
                  <div class="fp-seg" data-key="exclude">
                    <button type="button" data-v="all" class="active">Tất cả</button>
                    <button type="button" data-v="excluded">Đã loại trừ</button>
                    <button type="button" data-v="not">Chưa</button>
                  </div>
                </div>
                <div class="fp-group">
                  <label>Ghi chú</label>
                  <div class="fp-seg" data-key="note">
                    <button type="button" data-v="all" class="active">Tất cả</button>
                    <button type="button" data-v="has">Có ghi chú</button>
                    <button type="button" data-v="none">Chưa có</button>
                  </div>
                </div>
                <div class="fp-foot">
                  <button type="button" class="btn secondary small" id="fClear">Xoá lọc</button>
                  <button type="button" class="btn accent small" id="fApply">Áp dụng</button>
                </div>
              </div>
            </div>
            <button class="btn accent small tb-action" id="bulkBtn">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
              Báo hàng loạt (chưa báo)
            </button>
          </div>

          <!-- Dòng thông tin gọn (thay thanh thẻ đếm đã bỏ): trạng thái đang lọc + số chưa báo -->
          <div id="countInfo" class="count-info muted"></div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:34px"></th>
                  <th class="center" style="width:50px">STT</th>
                  <th>Ngày nhập kho</th>
                  <th>Khách hàng</th>
                  <th>SĐT</th>
                  <th class="center">ND báo hàng</th>
                  <th class="center">ND báo ship</th>
                  <th>Trạng thái</th>
                  <th>Ghi chú</th>
                  <th class="center" style="width:120px">Gửi tin</th>
                  <th class="center" style="width:64px" title="Tick để đánh dấu Delay — loại khỏi Báo hàng loạt">Loại trừ</th>
                  <th>Nhân viên</th>
                </tr>
              </thead>
              <tbody id="rows"><tr><td colspan="12" class="empty">Đang tải...</td></tr></tbody>
            </table>
            <datalist id="notePresets"></datalist>
          </div>
          <div class="pager hidden" id="pager"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal xem/sửa nội dung + gửi Zalo -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">Nội dung báo hàng</h3>
      <p class="muted" id="modalSub"></p>
      <textarea id="modalMsg"></textarea>
      <div class="field" style="margin-top:10px">
        <label for="modalAccount">Gửi bằng tài khoản</label>
        <select id="modalAccount"><option value="">Tự động (theo nhân viên)</option></select>
      </div>
      <div class="row">
        <button class="btn secondary" id="modalCancel">Đóng</button>
        <button class="btn btn-zalo" id="modalSend">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
          Gửi báo hàng qua Zalo
        </button>
      </div>
    </div>
  </div>

  <!-- Modal xác nhận báo hàng loạt -->
  <div class="modal-bg" id="bulkModalBg">
    <div class="modal" style="width:440px;">
      <h3>Xác nhận báo hàng loạt</h3>
      <p class="muted" id="bulkSummary"></p>
      <div class="row">
        <button class="btn secondary" id="bulkCancel">Huỷ</button>
        <button class="btn accent" id="bulkConfirm">Báo hàng</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script>App.initUserAvatar();</script>
</body>
</html>
