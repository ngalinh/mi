<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fefcf6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mi" />
  <title>Mi · Lịch sử báo hàng</title>
  <link rel="icon" type="image/png" href="favicon.png?v=3" />
  <link rel="apple-touch-icon" href="favicon.png?v=3" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar: icon rail -->
    <aside class="sidebar">
      <div class="brand" title="Mi">
        <img class="brand-logo" src="mi-logo.png" alt="Mi" />
      </div>
      <nav class="rail-nav">
        <a class="nav" href="index.html" title="Hàng về VN"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span></a>
        <a class="nav active" href="reports.html" title="Lịch sử báo"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg></span></a>
        <a class="nav" href="danhba.html" title="Danh bạ Zalo"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><circle cx="12" cy="9" r="2"/><path d="M15.5 15a3.5 3.5 0 0 0-7 0"/></svg></span></a>
      </nav>
      <div class="side-foot">
        <a class="nav" href="settings.html" title="Cài đặt"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span></a>
        <span class="rail-sep"></span>
        <div class="avatar" id="userAvatar" title="Đang tải...">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div>
          <h1>Lịch sử <span class="accent">báo hàng</span></h1>
        </div>
        <span class="spacer"></span>
        <button id="reloadBtn" class="btn secondary">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          Tải lại
        </button>
      </header>

      <div class="container">
        <div class="status-tabs cols-4" id="statCards">
          <button type="button" class="status-tab st-total active" data-filter="">
            <span class="st-icon"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg></span>
            <span class="st-label">Tổng lượt báo</span>
            <span class="st-num" id="sTotal">0</span>
          </button>
          <button type="button" class="status-tab st-pending" data-filter="pending">
            <span class="st-icon"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
            <span class="st-label">Pending</span>
            <span class="st-num" id="sPending">0</span>
          </button>
          <button type="button" class="status-tab st-success" data-filter="success">
            <span class="st-icon"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="m9 12 2 2 4-4"/></svg></span>
            <span class="st-label">Done</span>
            <span class="st-num" id="sSuccess">0</span>
          </button>
          <button type="button" class="status-tab st-fail" data-filter="failed">
            <span class="st-icon"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span>
            <span class="st-label">Failed</span>
            <span class="st-num" id="sFailed">0</span>
          </button>
        </div>

        <div class="card">
          <div class="toolbar">
            <div class="field" style="width:160px"><label>Từ ngày</label>
              <input id="fFrom" type="date" />
            </div>
            <div class="field" style="width:160px"><label>Đến ngày</label>
              <input id="fTo" type="date" />
            </div>
            <div class="field" style="width:170px"><label>Trạng thái</label>
              <select id="fStatus"><option value="">Tất cả</option><option value="pending">Pending</option><option value="success">Done</option><option value="failed">Failed</option></select>
            </div>
            <div class="field" style="width:170px"><label>Nhân viên</label>
              <select id="fStaff"><option value="">Tất cả</option></select>
            </div>
            <div class="field" style="width:170px"><label>Người gửi</label>
              <select id="fSender"><option value="">Tất cả</option></select>
            </div>
            <div class="field" style="width:170px"><label>Tài khoản</label>
              <select id="fAccount"><option value="">Tất cả</option></select>
            </div>
            <div class="field grow"><label>Tìm kiếm</label>
              <div class="input-icon">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input id="fQ" placeholder="Tên / SĐT / mã đơn" />
              </div>
            </div>
          </div>

          <div class="table-wrap">
            <table class="reports-table">
              <colgroup>
                <col class="c-time" />
                <col class="c-order" />
                <col class="c-img" />
                <col class="c-cust" />
                <col class="c-phone" />
                <col class="c-result" />
                <col class="c-staff" />
                <col class="c-sender" />
                <col class="c-account" />
                <col class="c-msg" />
                <col class="c-err" />
                <col class="c-action" />
              </colgroup>
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Mã đơn</th>
                  <th class="center">Ảnh SP</th>
                  <th>Khách hàng</th>
                  <th>SĐT</th>
                  <th>Trạng thái</th>
                  <th>Nhân viên</th>
                  <th>Người gửi</th>
                  <th>Tài khoản</th>
                  <th>Nội dung</th>
                  <th>Lỗi</th>
                  <th class="center">Thao tác</th>
                </tr>
              </thead>
              <tbody id="rows"><tr><td colspan="12" class="empty">Đang tải...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/app.js"></script>
  <script src="js/reports.js"></script>
  <script>App.initMobileNav(); App.initUserAvatar();</script>
</body>
</html>
