<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doraemi · Lịch sử báo hàng</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <nav class="topnav">
    <span class="brand">🤖 DORAEMI</span>
    <a class="nav" href="/index.html">Hàng về VN</a>
    <a class="nav active" href="/reports.html">Lịch sử báo</a>
    <span class="spacer"></span>
  </nav>

  <div class="container">
    <div class="stats">
      <div class="stat"><div class="num" id="sTotal">0</div><div class="lbl">Tổng lượt báo</div></div>
      <div class="stat"><div class="num" style="color:var(--green)" id="sSuccess">0</div><div class="lbl">Thành công</div></div>
      <div class="stat"><div class="num" style="color:var(--red)" id="sFailed">0</div><div class="lbl">Thất bại</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h1>Lịch sử báo hàng</h1>
        <button id="reloadBtn" class="btn secondary small">↻ Tải lại</button>
      </div>

      <div class="toolbar">
        <div class="field" style="width:200px"><label>Trạng thái</label>
          <select id="fStatus"><option value="">Tất cả</option><option value="success">Thành công</option><option value="failed">Thất bại</option></select>
        </div>
        <div class="field grow"><label>Tìm kiếm</label><input id="fQ" placeholder="Tên / SĐT / mã đơn" /></div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Thời gian</th>
            <th>Mã đơn</th>
            <th>Khách hàng</th>
            <th>SĐT</th>
            <th>Nhân viên</th>
            <th>Nội dung</th>
            <th>Kết quả</th>
            <th>Lỗi</th>
          </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="8" class="empty">Đang tải...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/app.js"></script>
  <script src="/js/reports.js"></script>
</body>
</html>
