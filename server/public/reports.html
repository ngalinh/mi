<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doraemi · Lịch sử báo hàng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar: icon rail -->
    <aside class="sidebar">
      <div class="brand" title="Doraemi">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
      </div>
      <nav class="rail-nav">
        <a class="nav" href="/index.html" title="Hàng về VN"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span></a>
        <a class="nav active" href="/reports.html" title="Lịch sử báo"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg></span></a>
      </nav>
      <div class="side-foot">
        <span class="rail-sep"></span>
        <div class="avatar" title="Doraemi Bot">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div>
          <h1>Lịch sử <span class="accent">báo hàng</span></h1>
          <div class="sub">Nhật ký mọi lượt gửi tin nhắn qua Zalo</div>
        </div>
        <span class="spacer"></span>
        <button id="reloadBtn" class="btn secondary">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          Tải lại
        </button>
      </header>

      <div class="container">
        <div class="stats">
          <div class="stat"><div class="num" id="sTotal">0</div><div class="lbl">Tổng lượt báo</div></div>
          <div class="stat ok"><div class="num" style="color:var(--green)" id="sSuccess">0</div><div class="lbl">Thành công</div></div>
          <div class="stat bad"><div class="num" style="color:var(--red)" id="sFailed">0</div><div class="lbl">Thất bại</div></div>
        </div>

        <div class="card">
          <div class="toolbar">
            <div class="field" style="width:200px"><label>Trạng thái</label>
              <select id="fStatus"><option value="">Tất cả</option><option value="success">Thành công</option><option value="failed">Thất bại</option></select>
            </div>
            <div class="field grow"><label>Tìm kiếm</label>
              <div class="input-icon">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input id="fQ" placeholder="Tên / SĐT / mã đơn" />
              </div>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Thời gian</th>
                  <th>Mã đơn</th>
                  <th>Khách hàng</th>
                  <th>SĐT</th>
                  <th>Nhân viên</th>
                  <th>Nội dung</th>
                  <th>Kết quả</th>
                  <th>Lỗi</th>
                </tr>
              </thead>
              <tbody id="rows"><tr><td colspan="8" class="empty">Đang tải...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/app.js"></script>
  <script src="/js/reports.js"></script>
</body>
</html>
