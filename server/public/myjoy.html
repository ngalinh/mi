<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi · MyJoy</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .mj-wrap { display: grid; grid-template-columns: 260px 1fr; gap: 16px; height: calc(100vh - 150px); min-height: 420px; }
    .mj-list { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
    .mj-list-head { padding: 12px; border-bottom: 1px solid #edf2f7; }
    .mj-new { width: 100%; }
    .mj-convs { flex: 1; overflow-y: auto; padding: 6px; }
    .mj-conv { display: flex; align-items: center; gap: 6px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #2d3748; }
    .mj-conv:hover { background: #f7fafc; }
    .mj-conv.active { background: #fdf2f7; color: var(--primary, #e05c8a); font-weight: 600; }
    .mj-conv .t { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mj-conv .del { opacity: 0; color: #a0aec0; font-size: 16px; line-height: 1; }
    .mj-conv:hover .del { opacity: 1; }
    .mj-conv .del:hover { color: #e53e3e; }
    .mj-empty-list { padding: 18px 12px; color: #a0aec0; font-size: 13px; text-align: center; }

    .mj-chat { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
    .mj-chat-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #edf2f7; }
    .mj-chat-title { font-weight: 600; font-size: 15px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mj-msgs { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
    .mj-row { display: flex; }
    .mj-row.user { justify-content: flex-end; }
    .mj-bubble { max-width: 76%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .mj-row.user .mj-bubble { background: var(--primary, #e05c8a); color: #fff; border-bottom-right-radius: 4px; }
    .mj-row.assistant .mj-bubble { background: #f1f5f9; color: #1a202c; border-bottom-left-radius: 4px; }
    .mj-hint { margin: auto; color: #a0aec0; font-size: 14px; text-align: center; padding: 24px; }
    .mj-compose { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #edf2f7; }
    .mj-compose textarea { flex: 1; resize: none; border: 1px solid #cbd5e0; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: inherit; max-height: 120px; }
    .mj-compose textarea:focus { outline: none; border-color: var(--primary, #e05c8a); }
    .mj-share-note { font-size: 12px; color: #718096; padding: 0 16px 10px; }
    .mj-share-note a { color: var(--primary, #e05c8a); word-break: break-all; }
    @media (max-width: 720px) { .mj-wrap { grid-template-columns: 1fr; height: auto; } .mj-list { max-height: 200px; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand" title="Mi">
        <img class="brand-logo" src="mi-logo.png" alt="Mi" />
      </div>
      <nav class="rail-nav">
        <a class="nav" href="index.html" title="Hàng về VN"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span></a>
        <a class="nav" href="reports.html" title="Lịch sử báo"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg></span></a>
        <a class="nav active" href="myjoy.html" title="MyJoy"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg></span></a>
      </nav>
      <div class="side-foot">
        <a class="nav" href="settings.html" title="Cài đặt"><span class="ic"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span></a>
        <span class="rail-sep"></span>
        <div class="avatar" id="userAvatar" title="Đang tải...">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div><h1>Chat với <span class="accent">MyJoy</span></h1></div>
      </header>

      <div class="container">
        <div class="mj-wrap">
          <!-- Danh sách hội thoại -->
          <div class="mj-list">
            <div class="mj-list-head">
              <button class="btn accent mj-new" id="newConvBtn">+ Cuộc trò chuyện mới</button>
            </div>
            <div class="mj-convs" id="convList"><div class="mj-empty-list">Đang tải...</div></div>
          </div>

          <!-- Khung chat -->
          <div class="mj-chat">
            <div class="mj-chat-head">
              <span class="mj-chat-title" id="chatTitle">MyJoy</span>
              <button class="btn secondary small" id="shareBtn" style="display:none">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
                Share
              </button>
            </div>
            <div class="mj-share-note" id="shareNote" style="display:none"></div>
            <div class="mj-msgs" id="msgs">
              <div class="mj-hint">Chọn hoặc tạo một cuộc trò chuyện để bắt đầu chat với MyJoy.</div>
            </div>
            <div class="mj-compose">
              <textarea id="input" rows="1" placeholder="Nhắn cho MyJoy..." disabled></textarea>
              <button class="btn accent" id="sendBtn" disabled>Gửi</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/app.js"></script>
  <script src="js/myjoy.js"></script>
  <script>App.initUserAvatar();</script>
</body>
</html>
